@if (isOpen()) {
  <div class="login-modal-backdrop" (click)="onBackdropClick($event)">
    <div class="login-modal" role="dialog" aria-modal="true" aria-labelledby="login-modal-title">
      <button
        class="close-button"
        type="button"
        aria-label="Close login modal"
        (click)="onCloseClick()"
      >
        x
      </button>

      <h2 id="login-modal-title">Choose login method</h2>
      <p class="description">Sign in to save your links and manage your account.</p>

      <button class="google-button" type="button" (click)="onGoogleClick()">
        Continue with Google
      </button>
    </div>
  </div>
}
