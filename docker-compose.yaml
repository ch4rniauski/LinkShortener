services:
  maria-db:
    image: mariadb:lts-ubi9
    container_name: maria-db
    ports:
      - 3306:3306
    environment:
      - MARIADB_ROOT_PASSWORD=5432
      - MARIADB_USER=example-user
      - MARIADB_PASSWORD=5432
      - MARIADB_DATABASE=Links
    volumes:
      - maria-db-data:/var/lib/mysql
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    container_name: keycloak
    ports:
      - 8081:8080
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    command: start-dev
volumes:
  maria-db-data:
