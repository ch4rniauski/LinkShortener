<div class="user-menu">
  <button
    class="avatar-button"
    type="button"
    [attr.aria-expanded]="isOpen()"
    aria-label="Open user menu"
    (click)="onToggleClick()"
  >
    <img
      class="avatar-image"
      [ngSrc]="userPicture()"
      width="40"
      height="40"
      [alt]="userName() + ' profile picture'"
    >
  </button>

  @if (isOpen()) {
    <div class="menu-dropdown">
      <p class="user-name">{{ userName() }}</p>
      <button
        class="logout-button"
        type="button"
        (click)="onLogoutClick()"
      >Log out</button>
    </div>
  }
</div>
